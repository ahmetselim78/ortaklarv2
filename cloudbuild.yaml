steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=$_VITE_SUPABASE_URL'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY'
      - '--build-arg'
      - 'VITE_MISTRAL_API_KEY=$_VITE_MISTRAL_API_KEY'
      # --- CLOUDFLARE R2 İÇİN EKLENEN YENİ SATIRLAR (BURADAN BAŞLIYOR) ---
      - '--build-arg'
      - 'VITE_R2_UPLOAD_URL=$_VITE_R2_UPLOAD_URL'
      - '--build-arg'
      - 'VITE_R2_PUBLIC_BASE_URL=$_VITE_R2_PUBLIC_BASE_URL'
      - '--build-arg'
      - 'VITE_R2_UPLOAD_SECRET=$_VITE_R2_UPLOAD_SECRET'
      # --- CLOUDFLARE R2 BİTTİ (AŞAĞISI ESKİSİ GİBİ KALACAK) ---
      - '-t'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME:$COMMIT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: Build

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME:$COMMIT_SHA'
    id: Push

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - '$_SERVICE_NAME'
      - '--platform=managed'
      - '--image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME:$COMMIT_SHA'
      - '--region=$_DEPLOY_REGION'
      - '--quiet'

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router için: bilinmeyen path'ler index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyalar için cache header
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|bcmap)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # .mjs dosyaları için doğru MIME tipi — pdf.js worker'ın çalışması için zorunlu
    # nginx varsayılan mime.types'ında .mjs bulunmaz; eksik olunca tarayıcı
    # dosyayı application/octet-stream olarak alır ve Web Worker olarak çalıştırmayı reddeder.
    location ~* \.mjs$ {
        types { }
        default_type text/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;
}
